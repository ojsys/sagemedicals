{% with rurl=request.path %}
<div style="display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:24px;overflow-x:auto">
  <a href="{% url 'reports:operational' %}" style="padding:10px 18px;font-size:13px;font-weight:500;text-decoration:none;border-bottom:2px solid {% if '/operational' in rurl %}var(--sage-primary){% else %}transparent{% endif %};color:{% if '/operational' in rurl %}var(--sage-primary){% else %}var(--text-2){% endif %};white-space:nowrap;display:flex;align-items:center;gap:6px">
    <i class="bi bi-speedometer2"></i>Operational
  </a>
  <a href="{% url 'reports:financial' %}" style="padding:10px 18px;font-size:13px;font-weight:500;text-decoration:none;border-bottom:2px solid {% if '/financial' in rurl %}var(--sage-primary){% else %}transparent{% endif %};color:{% if '/financial' in rurl %}var(--sage-primary){% else %}var(--text-2){% endif %};white-space:nowrap;display:flex;align-items:center;gap:6px">
    <i class="bi bi-cash-coin"></i>Financial
  </a>
  <a href="{% url 'reports:clinical' %}" style="padding:10px 18px;font-size:13px;font-weight:500;text-decoration:none;border-bottom:2px solid {% if '/clinical' in rurl %}var(--sage-primary){% else %}transparent{% endif %};color:{% if '/clinical' in rurl %}var(--sage-primary){% else %}var(--text-2){% endif %};white-space:nowrap;display:flex;align-items:center;gap:6px">
    <i class="bi bi-heart-pulse"></i>Clinical
  </a>
  <a href="{% url 'reports:monthly' %}" style="padding:10px 18px;font-size:13px;font-weight:500;text-decoration:none;border-bottom:2px solid {% if '/monthly' in rurl %}var(--sage-primary){% else %}transparent{% endif %};color:{% if '/monthly' in rurl %}var(--sage-primary){% else %}var(--text-2){% endif %};white-space:nowrap;display:flex;align-items:center;gap:6px">
    <i class="bi bi-calendar-month"></i>Monthly Return
  </a>
</div>
{% endwith %}
