<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Out — SAGE EMR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --sage-ink:#0B1E2D; --sage-ink-soft:#1B3A52; --sage-primary:#0F4C81; --sage-teal:#1B998B; --sage-red:#B83A26; --bg:#F4F5F2; --surface:#FFFFFF; --line:#DCDFD7; --text:#0B1E2D; --text-3:#6E7A82; --radius:10px; }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-font-smoothing:antialiased; }
    body { font-family:'Geist',system-ui,sans-serif; background:var(--bg); font-size:14px; color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    .wrap { width:100%; max-width:380px; text-align:center; }
    .brand { font-family:'Fraunces',serif; font-size:26px; font-weight:600; letter-spacing:-0.04em; color:var(--sage-ink); text-decoration:none; display:block; margin-bottom:40px; }
    .brand .dot { color:var(--sage-teal); }
    .title { font-family:'Fraunces',serif; font-size:26px; font-weight:400; letter-spacing:-0.02em; margin-bottom:8px; }
    .sub { color:var(--text-3); font-size:13px; margin-bottom:28px; }
    .card { background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:24px; }
    .btn-primary { display:block; width:100%; background:var(--sage-ink); color:#fff; padding:12px; border:none; border-radius:var(--radius); font-size:14px; font-weight:500; cursor:pointer; font-family:'Geist',sans-serif; transition:background .15s; text-align:center; }
    .btn-primary:hover { background:var(--sage-ink-soft); }
    .btn-ghost { display:block; width:100%; background:transparent; color:var(--text-3); padding:10px; border:1px solid var(--line); border-radius:var(--radius); font-size:14px; cursor:pointer; font-family:'Geist',sans-serif; margin-top:8px; text-decoration:none; text-align:center; transition:border-color .15s; }
    .btn-ghost:hover { border-color:var(--sage-ink); color:var(--sage-ink); }
  </style>
</head>
<body>
<div class="wrap">
  <a href="/" class="brand">SAGE<span class="dot">.</span></a>
  <div class="title">Sign out?</div>
  <div class="sub">You'll need to sign in again to access the EMR.</div>

  <div class="card">
    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn-primary">Yes, sign me out</button>
    </form>
    <a href="/" class="btn-ghost">Cancel — stay signed in</a>
  </div>
</div>
</body>
</html>
