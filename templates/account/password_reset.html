<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — SAGE Medical Center EMR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --sage-ink:#0B1E2D; --sage-ink-soft:#1B3A52; --sage-primary:#0F4C81; --sage-teal:#1B998B; --sage-red:#B83A26; --bg:#F4F5F2; --surface:#FFFFFF; --line:#DCDFD7; --text:#0B1E2D; --text-2:#3D4D58; --text-3:#6E7A82; --radius:10px; }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-font-smoothing:antialiased; }
    body { font-family:'Geist',system-ui,sans-serif; background:var(--bg); font-size:14px; color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    .wrap { width:100%; max-width:400px; }
    .brand { font-family:'Fraunces',serif; font-size:26px; font-weight:600; letter-spacing:-0.04em; color:var(--sage-ink); text-decoration:none; display:block; margin-bottom:32px; }
    .brand .dot { color:var(--sage-teal); }
    .page-title { font-family:'Fraunces',serif; font-size:28px; font-weight:400; letter-spacing:-0.02em; color:var(--sage-ink); margin-bottom:6px; }
    .page-sub { color:var(--text-3); font-size:13px; line-height:1.6; margin-bottom:24px; }
    .card { background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:28px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.12em; color:var(--text-3); margin-bottom:5px; }
    .field input { width:100%; padding:11px 14px; border:1px solid var(--line); border-radius:var(--radius); font-size:14px; background:var(--bg); font-family:'Geist',sans-serif; color:var(--text); transition:border-color .15s, box-shadow .15s; }
    .field input:focus { outline:none; border-color:var(--sage-primary); background:var(--surface); box-shadow:0 0 0 3px rgba(15,76,129,.1); }
    .submit-btn { width:100%; background:var(--sage-ink); color:#fff; padding:12px; border:none; border-radius:var(--radius); font-size:14px; font-weight:500; cursor:pointer; margin-top:4px; font-family:'Geist',sans-serif; transition:background .15s; }
    .submit-btn:hover { background:var(--sage-ink-soft); }
    .footer-link { margin-top:20px; text-align:center; font-size:13px; color:var(--text-3); }
    .footer-link a { color:var(--sage-primary); text-decoration:none; }
  </style>
</head>
<body>
<div class="wrap">
  <a href="{% url 'account_login' %}" class="brand">SAGE<span class="dot">.</span></a>
  <div class="page-title">Forgot password?</div>
  <div class="page-sub">Enter your email and we'll send you a link to reset your password.</div>

  <div class="card">
    <form method="post" action="{% url 'account_reset_password' %}">
      {% csrf_token %}
      <div class="field">
        <label for="{{ form.email.id_for_label }}">Email address</label>
        <input type="email" id="{{ form.email.id_for_label }}" name="{{ form.email.html_name }}"
               value="{{ form.email.value|default:'' }}"
               autocomplete="email" autofocus placeholder="you@sagemed.ng">
        {% if form.email.errors %}<div style="color:var(--sage-red);font-size:12px;margin-top:4px">{{ form.email.errors.0 }}</div>{% endif %}
      </div>
      <button type="submit" class="submit-btn">Send reset link →</button>
    </form>
  </div>

  <div class="footer-link">
    <a href="{% url 'account_login' %}">← Back to sign in</a>
  </div>
</div>
</body>
</html>
