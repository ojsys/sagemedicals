<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Your Email — SAGE EMR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --sage-ink:#0B1E2D; --sage-primary:#0F4C81; --sage-teal:#1B998B; --sage-green:#2E7D55; --bg:#F4F5F2; --surface:#FFFFFF; --line:#DCDFD7; --text:#0B1E2D; --text-3:#6E7A82; --radius:10px; }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-font-smoothing:antialiased; }
    body { font-family:'Geist',system-ui,sans-serif; background:var(--bg); font-size:14px; color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    .wrap { width:100%; max-width:420px; text-align:center; }
    .brand { font-family:'Fraunces',serif; font-size:26px; font-weight:600; letter-spacing:-0.04em; color:var(--sage-ink); text-decoration:none; display:block; margin-bottom:40px; }
    .brand .dot { color:var(--sage-teal); }
    .icon { width:64px; height:64px; background:rgba(46,125,85,.1); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:28px; color:var(--sage-green); }
    .title { font-family:'Fraunces',serif; font-size:28px; font-weight:400; letter-spacing:-0.02em; margin-bottom:12px; }
    .body-text { color:var(--text-3); font-size:13.5px; line-height:1.7; margin-bottom:28px; }
    .back-link { color:var(--sage-primary); text-decoration:none; font-size:13px; }
  </style>
</head>
<body>
<div class="wrap">
  <a href="{% url 'account_login' %}" class="brand">SAGE<span class="dot">.</span></a>
  <div class="icon">✉</div>
  <div class="title">Check your email</div>
  <p class="body-text">
    If that account exists, we've sent a password reset link.<br>
    Check your inbox — the link expires in 24 hours.
  </p>
  <a href="{% url 'account_login' %}" class="back-link">← Back to sign in</a>
</div>
</body>
</html>
