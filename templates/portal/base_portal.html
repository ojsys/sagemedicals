<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Patient Portal{% endblock %} — SAGE Medical</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root {
      --sage-ink:     #0B1E2D;
      --sage-primary: #0F4C81;
      --sage-teal:    #1B998B;
      --sage-teal-soft: #E6F4F1;
      --sage-amber:   #C9831D;
      --sage-amber-soft: #FBF1E0;
      --sage-red:     #B83A26;
      --sage-red-soft: #FBE9E5;
      --sage-green:   #2E7D55;
      --sage-green-soft: #E4F2EB;
      --bg:           #F4F5F2;
      --surface:      #FFFFFF;
      --surface-warm: #FBFBF7;
      --line:         #DCDFD7;
      --line-soft:    #E8EAE3;
      --text:         #0B1E2D;
      --text-2:       #3D4D58;
      --text-3:       #6E7A82;
      --radius:       10px;
      --radius-lg:    14px;
      --shadow:       0 2px 4px rgba(11,30,45,.06), 0 8px 24px rgba(11,30,45,.06);
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { background: var(--bg); color: var(--text); font-family: 'Geist', system-ui, sans-serif; font-size: 14px; line-height: 1.5; margin: 0; }

    .portal-topbar {
      background: var(--sage-ink);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .portal-brand { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; letter-spacing: -0.04em; color: #fff; text-decoration: none; }
    .portal-brand .dot { color: var(--sage-teal); }
    .portal-nav { display: flex; gap: 4px; align-items: center; }
    .portal-nav a {
      padding: 6px 12px; border-radius: var(--radius);
      font-size: 13px; color: rgba(255,255,255,.78); text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px; transition: all .15s;
    }
    .portal-nav a:hover, .portal-nav a.active { background: rgba(255,255,255,.08); color: #fff; }
    .portal-nav a.logout { color: rgba(255,255,255,.5); }

    .portal-content { max-width: 680px; margin: 0 auto; padding: 24px 20px 80px; }

    .portal-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .portal-section-h {
      font-family: 'Fraunces', serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--sage-ink);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin: 24px 0 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .portal-section-h a { font-family: 'Geist', sans-serif; font-size: 11px; color: var(--sage-primary); text-decoration: none; text-transform: none; letter-spacing: 0; font-weight: 400; }

    .tag { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 4px; font-size: 11.5px; font-weight: 500; }
    .tag.teal   { background: var(--sage-teal-soft); color: var(--sage-teal); }
    .tag.amber  { background: var(--sage-amber-soft); color: var(--sage-amber); }
    .tag.red    { background: var(--sage-red-soft); color: var(--sage-red); }
    .tag.green  { background: var(--sage-green-soft); color: var(--sage-green); }
    .tag.gray   { background: #ECEEE8; color: var(--text-2); }
    .tag .dot   { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; border: 1px solid transparent; cursor: pointer; font-family: inherit; text-decoration: none; transition: all .15s; }
    .btn-primary { background: var(--sage-ink); color: #fff; }
    .btn-teal    { background: var(--sage-teal); color: #fff; }
    .btn-ghost   { background: transparent; color: var(--text-2); border-color: var(--line); }

    .form-field { margin-bottom: 14px; }
    .form-field label { display: block; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-3); margin-bottom: 5px; }
    .form-field input, .form-field select, .form-field textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--radius);
      font-size: 14px; background: var(--surface); font-family: inherit; color: var(--text); transition: all .15s;
    }
    .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
      outline: none; border-color: var(--sage-primary); box-shadow: 0 0 0 3px rgba(15,76,129,.1);
    }

    .alert { padding: 12px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 14px; }
    .alert-danger  { background: var(--sage-red-soft); border: 1px solid #F5C8C0; color: var(--sage-red); }
    .alert-success { background: var(--sage-green-soft); border: 1px solid #B5D5C2; color: var(--sage-green); }
    .alert-info    { background: #E5EEF6; border: 1px solid #C4D8EA; color: var(--sage-primary); }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

{% if request.portal_patient %}
<nav class="portal-topbar">
  <a class="portal-brand" href="{% url 'portal:dashboard' %}">SAGE<span class="dot">.</span></a>
  <div class="portal-nav">
    <a href="{% url 'portal:dashboard' %}" class="{% block nav_dashboard %}{% endblock %}"><i class="bi bi-house"></i>Home</a>
    <a href="{% url 'portal:appointments' %}" class="{% block nav_appointments %}{% endblock %}"><i class="bi bi-calendar"></i>Appointments</a>
    <a href="{% url 'portal:results' %}" class="{% block nav_results %}{% endblock %}"><i class="bi bi-droplet-half"></i>Results</a>
    <a href="{% url 'portal:bills' %}" class="{% block nav_bills %}{% endblock %}"><i class="bi bi-receipt"></i>Bills</a>
    <a href="{% url 'portal:logout' %}" class="logout"><i class="bi bi-box-arrow-right"></i>Logout</a>
  </div>
</nav>
{% endif %}

<div class="portal-content">
  {% for msg in messages %}
  <div class="alert alert-{{ msg.tags|default:'info' }}">{{ msg }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
