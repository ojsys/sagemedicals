<div id="bell-dropdown" style="
  position:absolute;top:56px;right:8px;z-index:200;
  width:320px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--radius-lg);
  box-shadow:0 8px 32px rgba(11,30,45,.14);
  overflow:hidden;
">
  <div style="padding:12px 16px;border-bottom:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;font-weight:600;color:var(--sage-ink)">Alerts</span>
    <span style="font-size:11px;color:var(--text-3)">{{ alerts|length }} item{{ alerts|length|pluralize }}</span>
  </div>
  {% if alerts %}
  <div style="max-height:360px;overflow-y:auto">
    {% for alert in alerts %}
    <a href="{{ alert.url }}" style="display:flex;gap:12px;padding:12px 16px;text-decoration:none;border-bottom:1px solid var(--line-soft);transition:background .1s" onmouseover="this.style.background='var(--bg-2)'" onmouseout="this.style.background=''">
      <div style="
        width:32px;height:32px;border-radius:8px;flex-shrink:0;
        display:grid;place-items:center;font-size:15px;
        {% if alert.level == 'red' %}background:var(--sage-red-soft);color:var(--sage-red)
        {% elif alert.level == 'amber' %}background:var(--sage-amber-soft);color:var(--sage-amber)
        {% else %}background:#E5EEF6;color:#4A7BA0{% endif %}
      ">
        <i class="bi {{ alert.icon }}"></i>
      </div>
      <div style="min-width:0;flex:1">
        <div style="font-size:12.5px;font-weight:600;color:var(--sage-ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ alert.title }}</div>
        <div style="font-size:11.5px;color:var(--text-3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ alert.body }}</div>
      </div>
    </a>
    {% endfor %}
  </div>
  {% else %}
  <div style="padding:32px;text-align:center;color:var(--text-3)">
    <i class="bi bi-check2-all" style="font-size:24px;display:block;margin-bottom:8px;color:var(--sage-green)"></i>
    <div style="font-size:13px">All clear</div>
  </div>
  {% endif %}
</div>
