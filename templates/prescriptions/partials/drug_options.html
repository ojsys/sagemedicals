{% for drug in drugs %}
<button type="button"
        style="display:block;width:100%;text-align:left;padding:8px 12px;background:transparent;border:none;border-bottom:1px solid var(--line-soft);cursor:pointer;font-size:13px;color:var(--sage-ink)"
        onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background='transparent'"
        data-pk="{{ drug.pk }}">
  <span style="font-weight:500">{{ drug.generic_name }}</span>
  {% if drug.strength %}<span style="color:var(--text-3)"> {{ drug.strength }}</span>{% endif %}
  {% if drug.brand_name %}<span style="color:var(--text-3)"> ({{ drug.brand_name }})</span>{% endif %}
  <span class="tag gray" style="font-size:10px;margin-left:6px">{{ drug.get_dosage_form_display }}</span>
</button>
{% endfor %}
